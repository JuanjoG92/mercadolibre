<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>EcoMarket - Registrarse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="css/app.css"></head><body>
<div class="auth-page"><div class="auth-card">
  <div class="logo"><a href="/" class="nav-brand" style="justify-content:center"><div class="logo-icon"><i class="fas fa-bolt"></i></div><span>Eco<strong>Market</strong></span></a></div>
  <h2 data-i18n="reg.title">Crear cuenta</h2><p class="subtitle" data-i18n="reg.subtitle">Empezá a comprar y vender</p>
  <div id="regAlert" class="alert"></div>
  <form onsubmit="handleRegister(event)">
    <div class="form-group"><label data-i18n="reg.name">Nombre completo</label><input type="text" name="name" required></div>
    <div class="form-group"><label data-i18n="reg.email">Email</label><input type="email" name="email" required></div>
    <div class="form-row">
      <div class="form-group"><label data-i18n="reg.password">Contraseña</label><input type="password" name="password" required minlength="6"></div>
      <div class="form-group"><label data-i18n="reg.confirm">Confirmar</label><input type="password" name="confirm" required></div>
    </div>
    <div class="form-group"><label data-i18n="pub.location">Ubicación</label><input type="text" name="location" placeholder="Ej: Buenos Aires, Argentina"></div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" data-i18n="reg.btn">Crear cuenta</button>
  </form>
  <p class="auth-link"><span data-i18n="reg.has">¿Ya tenés cuenta?</span> <a href="login.html" data-i18n="reg.login">Ingresá</a></p>
</div></div>
<script src="js/app.js"></script></body></html>
