<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>EcoMarket - Ingresar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="css/app.css">
<link rel="manifest" href="manifest.json"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="EcoMarket"><link rel="apple-touch-icon" href="media/icons/icon-192.svg"><meta name="theme-color" content="#0f766e"></head>
<div class="auth-page"><div class="auth-card">
  <div class="logo"><a href="/" class="nav-brand" style="justify-content:center"><div class="logo-icon"><i class="fas fa-bolt"></i></div><span>Eco<strong>Market</strong></span></a></div>
  <h2 data-i18n="login.title">Ingresá a tu cuenta</h2><p class="subtitle" data-i18n="login.subtitle">Bienvenido de vuelta</p>
  <div id="loginAlert" class="alert"></div>
  <form onsubmit="handleLogin(event)">
    <div class="form-group"><label data-i18n="reg.email">Email</label><input type="email" name="email" required></div>
    <div class="form-group"><label data-i18n="reg.password">Contraseña</label><input type="password" name="password" required></div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" data-i18n="login.btn">Ingresar</button>
  </form>
  <p class="auth-link"><span data-i18n="login.no">¿No tenés cuenta?</span> <a href="register.html" data-i18n="login.register">Registrate</a></p>
</div></div>
<script src="js/app.js"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}</script>
</body></html>
